<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <title>ForgetMeNot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>ForgetMeNot</h1>
            <nav>
                <a href="{{ url_for('index') }}" class="{{ 'active' if active_page == 'home' }}">Meds</a>
                <a href="{{ url_for('history') }}" class="{{ 'active' if active_page == 'history' }}">History</a>
                <a href="{{ url_for('manage') }}" class="{{ 'active' if active_page == 'manage' }}">Manage</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
